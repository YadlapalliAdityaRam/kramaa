[build]
  # Repo root contains /frontend and /backend
  base = "frontend"
  command = "npm run build"
  publish = "dist"

[build.environment]
  NODE_VERSION = "20"

[[redirects]]
  from = "/api/*"
  to = "https://kramaa.onrender.com/api/:splat"
  status = 200
  force = true

[[redirects]]
  from = "/socket.io/*"
  to = "https://kramaa.onrender.com/socket.io/:splat"
  status = 200
  force = true

[[redirects]]
  from = "/uploads/*"
  to = "https://kramaa.onrender.com/uploads/:splat"
  status = 200
  force = true

# SPA fallback: route all frontend paths to index.html
[[redirects]]
  from = "/*"
  to = "/index.html"
  status = 200
